services:
  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spazeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-spazeai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spazeai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API (Hono) ──────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-spazeai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spazeai}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-spazeai}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      FAL_API_KEY: ${FAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Backoffice (Next.js) ────────────────────────────────
  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backoffice/src:/app/src
      - ./backoffice/public:/app/public
      - ./backoffice/next.config.ts:/app/next.config.ts
      - ./backoffice/tsconfig.json:/app/tsconfig.json
      - ./backoffice/postcss.config.mjs:/app/postcss.config.mjs
      - ./backoffice/eslint.config.mjs:/app/eslint.config.mjs
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      INTERNAL_API_URL: http://api:3001
    depends_on:
      - api

  # ── Landing (Next.js) ──────────────────────────────────
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ./landing/src:/app/src
      - ./landing/public:/app/public
      - ./landing/next.config.ts:/app/next.config.ts
      - ./landing/tsconfig.json:/app/tsconfig.json
      - ./landing/postcss.config.mjs:/app/postcss.config.mjs
      - ./landing/eslint.config.mjs:/app/eslint.config.mjs
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}

volumes:
  postgres_data:
